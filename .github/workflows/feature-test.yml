name: Feature Branch Testing

on:
  push:
    branches:
      - 'feature/*'
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

jobs:
  test-feature:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov pytest-asyncio
        
    - name: Run unit tests
      run: |
        python -m pytest app/tests/ --cov=app --cov-report=xml --cov-report=html -m "not integration" -v
        
    - name: Run linting
      run: |
        pip install black ruff mypy
        black --check app/
        ruff check app/
        mypy app/ --ignore-missing-imports
        
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: feature
        name: feature-coverage
        
    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-feature
        path: htmlcov/
        
  security-check:
    runs-on: ubuntu-latest
    needs: test-feature
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run basic security check
      run: |
        pip install safety
        safety check --severity medium
        
  notify-feature-status:
    runs-on: ubuntu-latest
    needs: [test-feature, security-check]
    if: always()
    
    steps:
    - name: Notify feature branch status
      run: |
        if [ "${{ needs.test-feature.result }}" == "success" ] && [ "${{ needs.security-check.result }}" == "success" ]; then
          echo "✅ Feature branch tests passed"
        else
          echo "❌ Feature branch tests failed"
        fi
