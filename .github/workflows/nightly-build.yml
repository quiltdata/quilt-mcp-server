name: Nightly Build (Develop Branch)

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual triggering
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov pytest-asyncio
        
    - name: Run tests
      run: |
        python -m pytest app/tests/ --cov=app --cov-report=xml --cov-report=html
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: develop
        name: develop-coverage
        
    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
        
  security-scan:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run security scan
      uses: snyk/actions/python@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
        
  build:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install build wheel
        
    - name: Build package
      run: |
        python -m build
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: dist/
        
    - name: Create development release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: develop-${{ github.run_number }}
        release_name: Development Build ${{ github.run_number }}
        body: |
          Automated development build from develop branch
          
          **Build Number:** ${{ github.run_number }}
          **Commit:** ${{ github.sha }}
          **Branch:** develop
          **Triggered:** ${{ github.event_name }}
          
          ## Artifacts
          - Python wheel and source distribution
          - Coverage reports
          Test results
          
          ## Next Steps
          - Review test results
          - Check security scan results
          - Merge to staging when ready
        draft: false
        prerelease: true
        
  create-staging-pr:
    runs-on: ubuntu-latest
    needs: [test, security-scan, build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create PR to staging
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        base: staging
        branch: develop-to-staging-${{ github.run_number }}
        title: "🚀 Nightly Build: Develop → Staging (Build #${{ github.run_number }})"
        body: |
          ## Nightly Build Integration
          
          This PR integrates the latest develop branch changes into staging for testing.
          
          **Build Number:** ${{ github.run_number }}
          **Source Branch:** develop
          **Target Branch:** staging
          **Triggered:** ${{ github.event_name }}
          
          ## Test Results
          - ✅ All tests passed
          - ✅ Security scan completed
          - ✅ Build successful
          
          ## Changes Included
          - Latest feature integrations
          - Bug fixes
          - Performance improvements
          
          ## Next Steps
          - Review changes
          - Run staging tests
          - Approve and merge when ready
          
          **Note:** This is an automated PR from the nightly build process.
        labels: |
          automated
          nightly-build
          develop-to-staging
        assignees: |
          QuiltSimon
        reviewers: |
          QuiltSimon
